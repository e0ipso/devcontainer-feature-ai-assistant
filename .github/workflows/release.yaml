name: "Release dev container features"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI - Test features"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: "Publish features"
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Make published packages public"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER}"
          namespace="devcontainer-feature-ai-assistant"
          failed=0

          packages="$(gh api "/user/packages?package_type=container" --paginate --jq '.[].name' | grep "^${namespace}" || true)"
          if [ -z "${packages}" ]; then
            echo "No ${namespace} container packages found for the authenticated user."
            exit 1
          fi

          for package in ${packages}; do
            encoded="${package//\//%2F}"
            visibility="$(gh api "/user/packages/container/${encoded}" --jq .visibility)"
            if [ "${visibility}" = "public" ]; then
              echo "✓ ${package} is already public"
              continue
            fi

            echo "Setting visibility=public for ${package}"
            if ! gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${encoded}" \
              --input - <<< '{"visibility":"public"}'; then
              echo "::error::Could not set ${package} to public. Open package settings and set visibility to Public:"
              echo "https://github.com/users/${owner}/packages/container/${encoded}/settings"
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            exit 1
          fi

      - name: "Verify features are publicly pullable"
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER}"
          namespace="devcontainer-feature-ai-assistant"
          failed=0

          for feature in claude codex copilot cursor opencode t3; do
            image="${namespace}/${feature}"
            token="$(curl -fsSL "https://ghcr.io/token?scope=repository:${owner}/${image}:pull" | jq -r .token)"
            if [ -z "${token}" ] || [ "${token}" = "null" ]; then
              echo "::error::Could not get an anonymous pull token for ghcr.io/${owner}/${image}"
              failed=1
              continue
            fi

            status="$(curl -sS -o /dev/null -w "%{http_code}" \
              "https://ghcr.io/v2/${owner}/${image}/manifests/1" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json")"
            if [ "${status}" = "200" ]; then
              echo "✓ ghcr.io/${owner}/${image}:1 is pullable"
            else
              echo "::error::ghcr.io/${owner}/${image}:1 returned HTTP ${status} (expected 200)"
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            exit 1
          fi
