name: "Release dev container features"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI - Test features"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: "Install devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Publish features"
        run: devcontainer features publish -r ghcr.io -n "${{ github.repository }}" ./src

      - name: "Make published packages public"
        run: bash .github/scripts/make-ghcr-packages-public.sh .

      - name: "Verify features are publicly pullable"
        run: bash .github/scripts/verify-ghcr-features.sh .
