name: "Release dev container features"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI - Test features"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: "Install devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Publish features"
        run: devcontainer features publish -r ghcr.io -n "${{ github.repository }}" ./src
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: "Make published packages public"
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER}"
          namespace="devcontainer-feature-ai-assistant"
          packages=(
            "${namespace}"
            "${namespace}/claude"
            "${namespace}/codex"
            "${namespace}/copilot"
            "${namespace}/cursor"
            "${namespace}/opencode"
            "${namespace}/t3"
          )

          for package in "${packages[@]}"; do
            encoded="${package//\//%2F}"
            settings_url="https://github.com/users/${owner}/packages/container/${encoded}/settings"

            visibility="$(gh api "/user/packages/container/${encoded}" --jq .visibility)"
            if [ "${visibility}" != "public" ]; then
              echo "Setting visibility=public for ${package}"
              gh api --method PATCH \
                -H "Accept: application/vnd.github+json" \
                "/user/packages/container/${encoded}" \
                --input - <<< '{"visibility":"public"}'
              visibility="$(gh api "/user/packages/container/${encoded}" --jq .visibility)"
            fi

            if [ "${visibility}" != "public" ]; then
              echo "::error title=Package is not public::${package} visibility is '${visibility}', expected 'public'. Set it manually: ${settings_url}"
              exit 1
            fi

            echo "✓ ${package} is public"
          done

      - name: "Verify features are publicly pullable"
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER}"
          namespace="devcontainer-feature-ai-assistant"
          failed=0

          for feature in claude codex copilot cursor opencode t3; do
            image="${namespace}/${feature}"
            token="$(curl -fsSL "https://ghcr.io/token?scope=repository:${owner}/${image}:pull" | jq -r .token)"
            if [ -z "${token}" ] || [ "${token}" = "null" ]; then
              echo "::error::Could not get an anonymous pull token for ghcr.io/${owner}/${image}"
              failed=1
              continue
            fi

            status="$(curl -sS -o /dev/null -w "%{http_code}" \
              "https://ghcr.io/v2/${owner}/${image}/manifests/1" \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json")"
            if [ "${status}" = "200" ]; then
              echo "✓ ghcr.io/${owner}/${image}:1 is pullable"
            else
              echo "::error::ghcr.io/${owner}/${image}:1 returned HTTP ${status} (expected 200)"
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            exit 1
          fi
